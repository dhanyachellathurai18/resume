<!DOCTYPE html>
<html lang="en">
<head>
<title>Register — ResumeAI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0d0d0d;
    --cream: #f5f0e8;
    --gold: #c9a84c;
    --gold-light: #e8c96e;
    --muted: #6b6560;
    --surface: #1a1814;
    --border: rgba(201,168,76,0.25);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 80% at 80% 50%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 20% 80%, rgba(201,168,76,0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  .noise {
    position: fixed; inset: 0; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  .card {
    position: relative;
    width: 440px;
    padding: 52px 48px 48px;
    border: 1px solid var(--border);
    background: var(--surface);
    animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 48px; right: 48px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .eyebrow {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 12px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem; font-weight: 900;
    color: var(--cream); line-height: 1.1; margin-bottom: 32px;
  }

  .field { margin-bottom: 14px; }

  label {
    display: block; font-size: 11px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 7px;
  }

  input {
    width: 100%; padding: 13px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    outline: none; transition: border-color 0.2s, background 0.2s;
  }

  input:focus { border-color: var(--gold); background: rgba(201,168,76,0.05); }
  input::placeholder { color: rgba(245,240,232,0.25); }

  .hint {
    font-size: 11px; color: var(--muted); margin-top: 6px; padding-left: 2px;
  }

  .btn {
    display: block; width: 100%; margin-top: 24px; padding: 15px;
    background: var(--gold); color: var(--ink);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    border: none; cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }

  .btn:hover { background: var(--gold-light); transform: translateY(-1px); }

  .footer-link {
    margin-top: 22px; font-size: 13px; color: var(--muted); text-align: center;
  }

  .footer-link a { color: var(--gold); text-decoration: none; font-weight: 500; }

  .brand {
    position: fixed; top: 32px; left: 40px;
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-weight: 700;
    color: var(--cream); letter-spacing: 0.02em;
  }

  .brand span { color: var(--gold); }
</style>
</head>
<body>
<div class="noise"></div>
<div class="brand">Resume<span>AI</span></div>

<div class="card">
  <p class="eyebrow">Get started free</p>
  <h1>Create your<br>account</h1>

  <form method="POST" action="/register">
    <div class="field">
      <label>Full Name</label>
      <input type="text" name="name" placeholder="John Doe" required>
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="you@example.com" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Min. 8 characters" required>
      <p class="hint">Use a strong, unique password.</p>
    </div>
    <button type="submit" class="btn">Create Account</button>
  </form>

  <p class="footer-link">Already have an account? <a href="/login">Sign in →</a></p>
</div>
</body>
</html>
